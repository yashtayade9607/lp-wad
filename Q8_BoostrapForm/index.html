<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">Event Registration Form</h2>

        <form class="needs-validation" novalidate>

            <!-- Name -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" placeholder="Name" required>
                <label for="name">Full Name</label>
                <div class="invalid-feedback">Please enter your name</div>
            </div>

            <!-- Email -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
                <label for="email">Email Address</label>
                <div class="invalid-feedback">Enter valid email</div>
            </div>

            <!-- Phone -->
            <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="phone" placeholder="Phone" required pattern="[0-9]{10}">
                <label for="phone">Mobile Number</label>
                <div class="invalid-feedback">Enter 10-digit mobile number</div>
            </div>

            <!-- Event Type -->
            <div class="mb-3">
                <label class="form-label">Select Event</label>
                <select class="form-select" required>
                    <option value="">Choose...</option>
                    <option>Workshop</option>
                    <option>Seminar</option>
                    <option>Hackathon</option>
                </select>
                <div class="invalid-feedback">Please select event</div>
            </div>

            <!-- Tooltip Field -->
            <div class="mb-3">
                <label class="form-label">College Name</label>
                <input type="text" class="form-control" 
                       data-bs-toggle="tooltip" 
                       title="Enter your full college name">
            </div>

            <!-- Terms -->
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" required>
                <label class="form-check-label">Accept Terms & Conditions</label>
                <div class="invalid-feedback">You must accept terms</div>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary w-100">Register</button>

        </form>
    </div>
</div>

<!-- Bootstrap JS (important for tooltips + validation) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* Enable Bootstrap Validation */
(() => {
    'use strict';
    const forms = document.querySelectorAll('.needs-validation');

    forms.forEach(form => {
        form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    });
})();

/* Enable Tooltips */
const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
tooltipTriggerList.forEach(t => {
    new bootstrap.Tooltip(t);
});
</script>

</body>
</html>
