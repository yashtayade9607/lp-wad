<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
</head>
<body>

<input type="text" placeholder="Enter City Name" id="city"><br><br>
<button onclick="getWeather()">Get Weather</button>

<div id="list"></div>

<script>
function getWeather() {
    const container = document.getElementById("list");
    let city = document.getElementById("city").value;

    // Fix case issue
    city = city.charAt(0).toUpperCase() + city.slice(1).toLowerCase();

    fetch("data.json")
    .then(res => res.json())
    .then(data => {
        if (data[city]) {
            container.innerHTML = `
                <h2>${city}</h2>
                Temperature: ${data[city].temp} °C <br>
                Humidity: ${data[city].humidity} % <br>
                Condition: ${data[city].desc}
            `;
        } else {
            container.innerHTML = "City Not Found!";
        }
    })
    .catch(err => {
        container.innerHTML = "Error loading data!";
        console.log(err);
    });
}
</script>

</body>
</html>
