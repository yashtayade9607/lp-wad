<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Weather App</h2>

        <!-- Input -->
         <div class="input-group mb-3">
            <input type="text" class="form-control" id="cityInput" placeholder="Enter city name">
            <button class="btn btn-primary" onclick="getWeather()">Get Weather</button>
         </div>

        <!-- Output -->
         <div id="result" class="card d-none">
            <div class="card-body">
                <h4 id="cityName"></h4>
                <p>Temperature: <span id="temp"></span> C</p>
                <p>Humidity: <span id="humidity"></span> %</p>
                <p>Condition: <span id="desc"></span></p>
            </div>
         </div>

        <!-- Error Message -->
         <div id="error" class="alert alert-danger d-none">
            City not found! Please try another.
         </div>
    </div>

    <script>
        function getWeather() {
            const city = document.getElementById("cityInput").value.trim().toLowerCase();

            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'data.json', true);

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    const weather = data[city];

                    if (weather) {
                        document.getElementById('cityName').innerText = city.charAt(0).toUpperCase() + city.slice(1);
                        document.getElementById('temp').innerText = weather.temp;
                        document.getElementById('humidity').innerText = weather.humidity;
                        document.getElementById('desc').innerText = weather.desc;

                        document.getElementById('result').classList.remove('d-none');
                        document.getElementById('error').classList.add('d-none');
                    }
                    else {
                        document.getElementById('result').classList.add('d-none');
                        document.getElementById('error').classList.remove('d-none');
                    }
                }
            };
            xhr.send();
        }
    </script>
    
</body>
</html>
