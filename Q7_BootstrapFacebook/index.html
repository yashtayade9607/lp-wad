<!DOCTYPE html>
<html>
<head>
    <title>Facebook Clone Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body style="background-color:#f0f2f5;">

    <!-- main Header -->
     
    <div class="bg-primary text-white p-3 mb-2">
        <div class="container d-flex justify-content-between align-items-center">

            <!-- title -->
            <h2 class="fw-bold mb-0">facebook</h2>

            <form class="d-flex align-items-center">
                <input class="form-control me-2" type="email" placeholder="Email">
                <input class="form-control me-2" type="password" placeholder="Password">
                <button class="btn btn-dark">Login</button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row align-items-center">

            <!-- left Section -->
            <div class="col-md-6">
                <h4 class="fw-bold">Facebook is useless without friends.<br>Make more friends.</h4>
                <p>Facebook helps you connect and share with the people in your life.</p>

                <img src="facebook.jpg" class="img-fluid shadow-lg rounded" alt="facebook image">
            </div>

            <!-- Right Section -->
            <div class="col-md-6">
                <h2>Create an Account</h2>
                <p>It's free and always will be.</p>

                <form>
                    <div class="row mb-2">
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Firstname">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Lastname">
                        </div>
                    </div>

                    <input class="form-control mb-2" type="email" placeholder="Email">
                    <input class="form-control mb-2" type="email" placeholder="Re-enter Email">
                    <input class="form-control mb-2" type="password" placeholder="Password">

                    <input class="form-control mb-2" type="date">

                    <!-- Gender -->
                    <div class="mb-2">
                        <label class="me-3">
                            <input type="radio" name="gender"> Male
                        </label>
                        <label>
                            <input type="radio" name="gender"> Female
                        </label>
                    </div>

                    <p style="font-size:14px;">
                        By clicking create an account, you agree to our Terms.
                    </p>

                    <button class="btn btn-success">Signup</button>
                </form>

                <p class="mt-3">
                    <a href="#">Create a page for you.</a>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
