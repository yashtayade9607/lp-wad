<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<div class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
        <h3 class="text-white">My Store</h3>

        <!--  FIXED -->
        <select id="categoryFilter" class="form-select w-25" onchange="filterProducts()">
            <option value="all">All</option>
            <option value="electronics">Electronics</option>
            <option value="fashion">Fashion</option>
        </select>
    </div>
</div>

<!-- Products -->
<div class="container mt-4">
    <div class="row" id="productcontainer">

        <!-- Product 1 -->
        <div class="col-md-4 mb-4 product" data-category="electronics">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">Excellent sound quality</p>
                    <h6>₹7999</h6>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-4 mb-4 product" data-category="electronics">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Smartwatch</h5>
                    <p class="card-text">Fitness tracking smartwatch</p>
                    <h6>₹12999</h6>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-4 mb-4 product" data-category="fashion">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">T-Shirt</h5>
                    <p class="card-text">Comfortable cotton wear</p>
                    <h6>₹999</h6>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-4 mb-4 product" data-category="fashion">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Shoes</h5>
                    <p class="card-text">Stylish sports shoes</p>
                    <h6>₹2999</h6>
                </div>
            </div>
        </div>

        <!-- Product 5 -->
        <div class="col-md-4 mb-4 product" data-category="electronics">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">High performance laptop</p>
                    <h6>₹55999</h6>
                </div>
            </div>
        </div>

        <!-- Product 6 -->
        <div class="col-md-4 mb-4 product" data-category="fashion">
            <div class="card h-100">
                <img src="https://via.placeholder.com/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Jacket</h5>
                    <p class="card-text">Winter wear jacket</p>
                    <h6>₹1999</h6>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Script -->
<script>
function filterProducts() {
    const selected = document.getElementById("categoryFilter").value;
    const products = document.querySelectorAll(".product");

    products.forEach(p => {
        if (selected === "all" || p.dataset.category === selected) {
            p.style.display = "block";
        } else {
            p.style.display = "none";
        }
    });
}
</script>

</body>
</html>
