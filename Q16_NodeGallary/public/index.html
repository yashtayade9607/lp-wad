<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #gallaryList {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 220px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0 5px;
        }

        .card p {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

<h1>Restaurant Gallery 🍽️</h1>

<div id="gallaryList">Restaurant Loading...</div>

<script>
    async function getGallary() {
        try {
            const response = await fetch("http://localhost:3000/api/gallary");
            const data = await response.json();

            const container = document.getElementById("gallaryList");

            container.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.filename}" alt="${p.title}">
                    <h3>${p.title}</h3>
                    <p>${p.description}</p>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById("gallaryList").innerText = "Error loading gallery";
        }
    }

    getGallary();
</script>

</body>
</html>
