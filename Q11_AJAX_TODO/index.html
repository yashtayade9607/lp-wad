<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form AJAX</title>
</head>
<body>
     <h2>Register</h2>
     <form id="reg-form">

        Name : <input type="text" placeholder="Enter the Name " id="name"> <br>
        Email : <input type="email" placeholder="Enter the Email" id="email"> <br>
        Mobile : <input type="number" placeholder="Enter the Mobile Number" id="mobile">
        DOB   : <input type="date" placeholder="DD-MM-YYYY" id="dob">
        City : <input type="text" placeholder="Enter the City" id="city">
        address : <textarea name="address" id="address"  >Enter Address</textarea>
        Password : <input type="password" id="password" placeholder="Your Password">
        
        <input type="submit" value="Submit" id="btn">
     </form>
     <!-- Load the Script after the Form  -->
      <script src="script.js"></script>
</body>
</html>
